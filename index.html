<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galería de Verónica</title>
  <link href="https://fonts.googleapis.com/css2?family=Gruppo&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --bg: #050505; }

    body {
      background: var(--bg);
      color: #ffffff;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ─── INTRO ─── */
    #intro {
      position: fixed; inset: 0; z-index: 1000;
      background: #000000;
      display: flex; align-items: center; justify-content: center;
    }
    #intro.fade-out { animation: introFadeOut 1.2s forwards; }
    
    @keyframes introFadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0; pointer-events: none; display: none; }
    }
    
    #flash {
      position: absolute; inset: 0;
      background: #ffffff;
      animation: flashAnim 1s ease-out forwards;
    }
    
    @keyframes flashAnim {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    
    #intro-title {
      font-family: 'Gruppo', cursive;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.2;
      text-align: center;
      opacity: 0;
      animation: fadeInTitle 2s ease-in-out 0.5s forwards;
      position: relative; z-index: 1;
    }

    @keyframes fadeInTitle {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ─── GALLERY ─── */
    #gallery {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ─── SPOTLIGHT (Top to Bottom) ─── */
    #spotlight {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.03) 40%, transparent 80%);
      pointer-events: none;
      z-index: 0;
      animation: spotlightSway 5s ease-in-out infinite alternate;
    }
    @keyframes spotlightSway {
      0%   { transform: translateY(-10%); opacity: 0.7; }
      100% { transform: translateY(5%); opacity: 1; }
    }

    /* ─── STAGE ─── */
    #stage {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ─── CARD ─── */
    .card-scene { perspective: 1200px; margin-bottom: 20px; }
    
    #card-wrapper {
      animation: floatArt 4s ease-in-out infinite;
    }
    
    @keyframes floatArt {
      0%, 100% { transform: translateY(0px);   }
      50%      { transform: translateY(-12px); }
    }

    #card {
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.85s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
      border-radius: 8px;
    }
    #card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 8px; overflow: hidden;
    }
    
    .card-front { 
      background: #111; 
      border: 2px solid rgba(255,255,255,0.1); 
    }
    
    .card-front img,
    .card-front video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .card-back {
      background: #111111;
      border: 2px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
      transform: rotateY(180deg); /* ¡Esta es la magia que faltaba! */
    }

    .card-back h2 {
      color: #ffffff;
      font-weight: bold;
      font-size: 2.2rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 15px rgba(255,255,255,0.4);
    }

    .card-back p {
      color: #ffffff;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    /* ─── SLIDE TRANSITION ─── */
    #card-wrapper.slide-left  { animation: slideLeft  0.45s cubic-bezier(.4,0,.2,1); }
    #card-wrapper.slide-right { animation: slideRight 0.45s cubic-bezier(.4,0,.2,1); }
    
    @keyframes slideLeft {
      0%   { transform: translateX(0);    opacity: 1; }
      45%  { transform: translateX(-15%); opacity: 0; }
      46%  { transform: translateX(15%);  opacity: 0; }
      100% { transform: translateX(0);    opacity: 1; }
    }
    @keyframes slideRight {
      0%   { transform: translateX(0);    opacity: 1; }
      45%  { transform: translateX(15%);  opacity: 0; }
      46%  { transform: translateX(-15%); opacity: 0; }
      100% { transform: translateX(0);    opacity: 1; }
    }

    /* ─── PODIUM (ROMAN/GREEK) ─── */
    #podium-wrap {
      position: relative; z-index: 1;
      display: flex; justify-content: center;
    }
    #podium-wrap svg {
      display: block;
      filter: drop-shadow(0 15px 25px rgba(255,255,255,0.08));
    }

    /* ─── ARROWS ─── */
    .arrow-btn {
      position: absolute; z-index: 10;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); 
      cursor: pointer;
      border-radius: 50%;
      width: clamp(45px, 8vw, 64px);
      height: clamp(45px, 8vw, 64px);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, transform 0.2s, border 0.3s;
    }
    .arrow-btn:hover {
      background: rgba(255,255,255,0.25);
      border: 1px solid #ffffff;
      transform: translateY(-50%) scale(1.1);
    }
    .arrow-btn svg {
      width: 40%; height: 40%;
      stroke: #ffffff; fill: none;
      stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round;
    }
    #btn-left  { left:  clamp(15px, 5vw, 50px); }
    #btn-right { right: clamp(15px, 5vw, 50px); }

    /* ─── COUNTER + HINT ─── */
    #counter {
      position: absolute; bottom: clamp(10px,3vw,20px);
      left: 50%; transform: translateX(-50%);
      font-size: 0.8rem;
      color: #ffffff;
      letter-spacing: 0.2em; z-index: 5;
    }
    #hint {
      position: absolute; bottom: clamp(35px,6vw,45px);
      left: 50%; transform: translateX(-50%);
      font-size: 0.75rem;
      color: #ffffff;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: pulse 2.5s ease-in-out infinite; z-index: 5;
    }
    @keyframes pulse { 0%,100%{opacity:.4;} 50%{opacity:.9;} }
  </style>
</head>
<body>

<div id="intro">
  <div id="flash"></div>
  <div id="intro-title">
    <span>Galería</span>
    <span>de Verónica</span>
  </div>
</div>

<div id="gallery">
  <div id="spotlight"></div>

  <button class="arrow-btn" id="btn-left" aria-label="Anterior">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div id="stage">
    <div id="card-wrapper">
      <div class="card-scene" id="card-scene">
        <div id="card">
          <div class="card-face card-front" id="card-front"></div>
          <div class="card-face card-back" id="card-back">
            <h2 id="art-title">Título</h2>
            <p id="art-desc">Descripción</p>
          </div>
        </div>
      </div>
    </div>
    
    <div id="podium-wrap">
      <svg viewBox="0 0 400 90" style="width:clamp(220px, 45vw, 400px)" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="marble" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#cccccc"/>
            <stop offset="25%" stop-color="#ffffff"/>
            <stop offset="75%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#bbbbbb"/>
          </linearGradient>
          <linearGradient id="marbleDark" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#aaaaaa"/>
            <stop offset="25%" stop-color="#e0e0e0"/>
            <stop offset="75%" stop-color="#e0e0e0"/>
            <stop offset="100%" stop-color="#999999"/>
          </linearGradient>
        </defs>
        <rect x="50" y="10" width="300" height="15" rx="3" fill="url(#marble)"/>
        <rect x="65" y="25" width="270" height="8" fill="url(#marbleDark)"/>
        <rect x="80" y="33" width="240" height="35" fill="url(#marble)"/>
        <line x1="100" y1="33" x2="100" y2="68" stroke="#e0e0e0" stroke-width="2"/>
        <line x1="140" y1="33" x2="140" y2="68" stroke="#e0e0e0" stroke-width="2"/>
        <line x1="180" y1="33" x2="180" y2="68" stroke="#e0e0e0" stroke-width="2"/>
        <line x1="220" y1="33" x2="220" y2="68" stroke="#e0e0e0" stroke-width="2"/>
        <line x1="260" y1="33" x2="260" y2="68" stroke="#e0e0e0" stroke-width="2"/>
        <line x1="300" y1="33" x2="300" y2="68" stroke="#e0e0e0" stroke-width="2"/>
        <rect x="40" y="68" width="320" height="10" fill="url(#marbleDark)"/>
        <rect x="20" y="78" width="360" height="12" rx="2" fill="url(#marble)"/>
      </svg>
    </div>
  </div>

  <button class="arrow-btn" id="btn-right" aria-label="Siguiente">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>

  <div id="hint">toca la imagen para ver info</div>
  <div id="counter"></div>
</div>

<audio id="bg-music" loop>
  <source src="Cancion.mp3" type="audio/mpeg"/>
</audio>
<audio id="arrow-sound">
  <source src="Mover.mp3" type="audio/mpeg"/>
</audio>

<script>
const ARTWORKS = [
  {
    src:   "1.jpg",
    type:  "image",
    title: "Mi Connor",
    desc:  "El día que encontré a mi bebé Connor y lo adopté, era muy pequeño."
  },
  {
    src:   "2.jpg",
    type:  "image",
    title: "Un ángel",
    desc:  "Iluminado de gracia y amigo de lobos."
  },
  {
    src:   "3.jpeg",
    type:  "image",
    title: "Mi única foto",
    desc:  "El arte es mi vida."
  },
  {
    src:   "4.jpg",
    type:  "image",
    title: "Hermano",
    desc:  "Mi hermano cuando todavía estaban construyendo la casa."
  },
  {
    src:   "5.jpg",
    type:  "image",
    title: "Cheri",
    desc:  "Cheri Cheri lady."
  }
];

function getCardSize(){
  if(window.innerWidth < 800){
    return {
      w: window.innerWidth * 0.85,
      h: window.innerHeight * 0.58
    };
  }
  return {
    w: 520,
    h: 700
  };
}

const card      = document.getElementById('card');
const cardScene = document.getElementById('card-scene');
const cardFront = document.getElementById('card-front');
const artTitle  = document.getElementById('art-title');
const artDesc   = document.getElementById('art-desc');
const cardWrap  = document.getElementById('card-wrapper');
const counter   = document.getElementById('counter');
const bgMusic   = document.getElementById('bg-music');
const arrowSnd  = document.getElementById('arrow-sound');
const intro     = document.getElementById('intro');

let current    = 0;
let isFlipped  = false;
let musicReady = false;

function applyCardSize() {
  const { w, h } = getCardSize();
  card.style.width       = w + 'px';
  card.style.height      = h + 'px';
  cardScene.style.width  = w + 'px';
  cardScene.style.height = h + 'px';
}

function buildMedia(art) {
  cardFront.innerHTML = '';
  if (art.type === 'video') {
    const v = document.createElement('video');
    v.src = art.src;
    v.autoplay = true; v.loop = true;
    v.muted = true; v.playsInline = true;
    cardFront.appendChild(v);
  } else {
    const img = document.createElement('img');
    img.src = art.src; img.alt = art.title;
    cardFront.appendChild(img);
  }
}

function loadArtwork(idx) {
  const art = ARTWORKS[idx];
  artTitle.textContent = art.title;
  artDesc.textContent  = art.desc;
  buildMedia(art);
  counter.textContent  = (idx + 1) + ' / ' + ARTWORKS.length;
}

function slide(dir) {
  if (!musicReady) return;
  // Si la tarjeta está volteada, la regresamos al frente antes de cambiar de obra
  if (isFlipped) { 
    isFlipped = false; 
    card.classList.remove('flipped'); 
  }
  
  playArrow();
  const cls = dir === -1 ? 'slide-left' : 'slide-right';
  cardWrap.classList.add(cls);
  cardWrap.addEventListener('animationend', () => {
    cardWrap.classList.remove(cls);
    current = (current + dir + ARTWORKS.length) % ARTWORKS.length;
    loadArtwork(current);
  }, { once: true });
}

function flipCard() {
  if (!musicReady) return;
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
}

function playArrow() {
  arrowSnd.currentTime = 0;
  arrowSnd.play().catch(() => {});
}

function startMusic() {
  if (!musicReady) {
    musicReady = true;
    bgMusic.volume = 100;
    bgMusic.play().catch(() => {});
  }
}

document.getElementById('btn-left').addEventListener('click',  () => slide(-1));
document.getElementById('btn-right').addEventListener('click', () => slide(1));
card.addEventListener('click', flipCard);
document.addEventListener('click',      startMusic, { once: true });
document.addEventListener('touchstart', startMusic, { once: true });
window.addEventListener('resize', applyCardSize);

// Intro
setTimeout(() => {
  intro.classList.add('fade-out');
}, 3500);

applyCardSize();
loadArtwork(0);
</script>
</body>
</html>
